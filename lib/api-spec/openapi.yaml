components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required: [code, message]
      required: [success, error]

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      required: [page, limit, total, totalPages]

    # ─── AUTH SCHEMAS ────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        language:
          type: string
          enum: [ar, fr, en]
          default: ar
      required: [fullName, email, password]

    LoginInput:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
      required: [accessToken, refreshToken, expiresIn]

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            user:
              $ref: "#/components/schemas/User"
            tokens:
              $ref: "#/components/schemas/AuthTokens"
          required: [user, tokens]
      required: [success, data]

    TokenPairResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/AuthTokens"
      required: [success, data]

    UserResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/User"
      required: [success, data]

    # ─── USER SCHEMAS ─────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        fullName:
          type: string
        phone:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [student, professor, club_manager, department_admin, faculty_admin, university_admin, moderator, agent, finance_admin, super_admin]
        emailVerified:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        profile:
          $ref: "#/components/schemas/Profile"
          nullable: true
      required: [id, email, fullName, role, emailVerified, isActive, createdAt]

    Profile:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        universityId:
          type: string
          nullable: true
        facultyId:
          type: string
          nullable: true
        departmentId:
          type: string
          nullable: true
        levelId:
          type: string
          nullable: true
        groupId:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
        privacy:
          type: string
          enum: [private, same_university, public]
        language:
          type: string
          enum: [ar, fr, en]
        university:
          $ref: "#/components/schemas/University"
          nullable: true
        faculty:
          $ref: "#/components/schemas/Faculty"
          nullable: true
        department:
          $ref: "#/components/schemas/Department"
          nullable: true
        level:
          $ref: "#/components/schemas/Level"
          nullable: true
        group:
          $ref: "#/components/schemas/Group"
          nullable: true
        onboardingComplete:
          type: boolean
      required: [id, userId, privacy, language, onboardingComplete]

    UpdateProfileInput:
      type: object
      properties:
        fullName:
          type: string
        phone:
          type: string
        bio:
          type: string
        skills:
          type: array
          items:
            type: string
        privacy:
          type: string
          enum: [private, same_university, public]
        language:
          type: string
          enum: [ar, fr, en]
        linkedinUrl:
          type: string
        githubUrl:
          type: string
        portfolioUrl:
          type: string

    OnboardingInput:
      type: object
      properties:
        universityId:
          type: string
        facultyId:
          type: string
        departmentId:
          type: string
        levelId:
          type: string
        groupId:
          type: string
        language:
          type: string
          enum: [ar, fr, en]
      required: [universityId, facultyId, departmentId, levelId]

    # ─── ACADEMIC SCHEMAS ─────────────────────────────────────────────────────
    University:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        nameAr:
          type: string
          nullable: true
        nameFr:
          type: string
          nullable: true
        city:
          type: string
        logoUrl:
          type: string
          nullable: true
        status:
          type: string
          enum: [community_created, verified, official_partner]
        facultyCount:
          type: integer
          nullable: true
      required: [id, name, city, status]

    UpdateAdminUserInput:
      type: object
      properties:
        role:
          type: string
          enum: [student, professor, club_manager, department_admin, faculty_admin, university_admin, moderator, agent, finance_admin, super_admin]
        isActive:
          type: boolean

    AdminCourse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        nameAr:
          type: string
          nullable: true
        nameFr:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        departmentId:
          type: string
        levelId:
          type: string
        semester:
          type: string
        professorId:
          type: string
          nullable: true
        professorName:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, departmentId, levelId, semester, isActive, createdAt]

    CreateAdminCourseInput:
      type: object
      properties:
        name:
          type: string
        nameAr:
          type: string
          nullable: true
        nameFr:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        departmentId:
          type: string
        levelId:
          type: string
        semester:
          type: string
          enum: [S1, S2, S3, S4, S5, S6, S7, S8]
        professorId:
          type: string
          nullable: true
        isActive:
          type: boolean
      required: [name, departmentId, levelId]

    UpdateAdminCourseInput:
      type: object
      properties:
        name:
          type: string
        nameAr:
          type: string
          nullable: true
        nameFr:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        semester:
          type: string
          enum: [S1, S2, S3, S4, S5, S6, S7, S8]
        professorId:
          type: string
          nullable: true
        isActive:
          type: boolean

    CreateUniversityInput:
      type: object
      properties:
        name:
          type: string
        nameAr:
          type: string
          nullable: true
        nameFr:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
