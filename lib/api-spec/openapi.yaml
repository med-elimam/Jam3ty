      required: [id, userId, planId, planName, status, source, startsAt, expiresAt, daysRemaining]

    PaymentProofInput:
      type: object
      properties:
        planId:
          type: string
        amountMru:
          type: integer
        method:
          type: string
          enum: [bankily, masrvi, sedad, cash_agent]
        phoneNumber:
          type: string
        transactionRef:
          type: string
          nullable: true
        proofUrl:
          type: string
          nullable: true
      required: [planId, amountMru, method, phoneNumber]

    Payment:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        planId:
          type: string
        planName:
          type: string
        amountMru:
          type: integer
        method:
          type: string
        status:
          type: string
          enum: [pending, under_review, approved, rejected, expired, refunded]
        phoneNumber:
          type: string
          nullable: true
        transactionRef:
          type: string
          nullable: true
        reviewedBy:
          type: string
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        rejectionReason:
          type: string
          nullable: true
        userEmail:
          type: string
          nullable: true
        userFullName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, userId, planId, planName, amountMru, method, status, createdAt]

    AdminDashboardStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalStudents:
          type: integer
        totalUniversities:
          type: integer
        totalCourses:
          type: integer
        totalFiles:
          type: integer
        activeSubscriptions:
          type: integer
      required: [totalUsers, totalStudents, totalUniversities, totalCourses, totalFiles, activeSubscriptions]

    # ─── NOTIFICATION SCHEMAS ─────────────────────────────────────────────────
    Notification:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        body:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, type, title, body, isRead, createdAt]

    # ─── DASHBOARD SCHEMAS ────────────────────────────────────────────────────
    DashboardHome:
      type: object
      properties:
        student:
          $ref: "#/components/schemas/User"
        subscription:
          $ref: "#/components/schemas/Subscription"
          nullable: true
        todaysSessions:
          type: array
          items:
            $ref: "#/components/schemas/TimetableSession"
        latestAnnouncements:
          type: array
          items:
            $ref: "#/components/schemas/Announcement"
        upcomingAssignments:
          type: array
          items:
            $ref: "#/components/schemas/Assignment"
        upcomingExams:
          type: array
          items:
            $ref: "#/components/schemas/Exam"
        recentFiles:
          type: array
          items:
            $ref: "#/components/schemas/AcademicFile"
        upcomingEvents:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        featuredOpportunities:
          type: array
          items:
            $ref: "#/components/schemas/Opportunity"
        unreadNotificationsCount:
          type: integer
      required: [student, todaysSessions, latestAnnouncements, upcomingAssignments, upcomingExams, recentFiles, upcomingEvents, featuredOpportunities, unreadNotificationsCount]
